name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PAGES_BASE_PATH: ${{ vars.PAGES_BASE_PATH }}

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Compute base path
        shell: bash
        run: |
          if [[ -n "$PAGES_BASE_PATH" ]]; then
            normalized="/${PAGES_BASE_PATH#/}"
            normalized="${normalized%/}"
            if [[ "$normalized" == "/" ]]; then
              normalized=""
            fi
            echo "BASE_PATH=$normalized" >> "$GITHUB_ENV"
          else
            repo_name="${GITHUB_REPOSITORY#*/}"
            if [[ "$repo_name" == "${GITHUB_REPOSITORY_OWNER}.github.io" ]]; then
              echo "BASE_PATH=" >> "$GITHUB_ENV"
            else
              echo "BASE_PATH=/$repo_name" >> "$GITHUB_ENV"
            fi
          fi

      - name: Build static export
        run: npm run build

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
